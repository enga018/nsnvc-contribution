/* ---------- constants ---------- */
const CURRENCY = "₹";
const TOAST_DURATION_MS = 2200;
const DASHBOARD_REFRESH_DEBOUNCE_MS = 250;
const CACHE_REFRESH_DELAY_MS = 5000;
const SHEET_CLOSE_DELAY_MS = 900;
const PAGE_RELOAD_DELAY_MS = 1500;
const LOGOUT_DELAY_MS = 1000;
const FIRESTORE_BATCH_SIZE = 400;
const BACKUP_MAX_SIZE_BYTES = 5*1024*1024;
const BACKUP_MAX_HOUSEHOLDS = 10000;
const MAX_FILE_SCAN_ROWS = 10000;

/* ---------- helpers ---------- */
const fmt = n => CURRENCY + (Number(n)||0).toLocaleString("en-IN");
const $ = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),TOAST_DURATION_MS);
}

function downloadBlob(content, filename, mimeType="application/octet-stream"){
  let url;
  try{
    const blob = new Blob([content], {type:mimeType});
    url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }finally{
    if(url) URL.revokeObjectURL(url);
  }
}
let excludedPeriods=[];
// Single source of truth for "does this charge count toward period-based
// calculations" — used by getEffectiveBalance, unpaidPeriods, and the
// Firebase store's listOwing so exclusion behaves identically everywhere.
// A charge with no note can't match any excluded period name, so it's
// never excluded by this check.
function isChargeExcluded(e){
  return !!(e.note && excludedPeriods.includes(e.note));
}
function statusOf(c){
  const bal = getEffectiveBalance(c);
  if(bal<=0) return "paid";
  if((c.totalPaid||0)>0) return "partial";
  return "due";
}
function getEffectiveBalance(c){
  const cachedBalance = Number(c.balance ?? 0);
  if(typeof c.balance === "number" && !excludedPeriods.length && (!c.ledger || !c.ledger.some(e => e.deferred))){
    return cachedBalance;
  }
  if(!c.ledger){
    return cachedBalance;
  }
  let includedCharged=0;
  for(const e of c.ledger){
    if(e.type==="charge" && !e.deferred && !isChargeExcluded(e)){
      includedCharged += Number(e.amount || 0);
    }
  }
  return includedCharged - Number(c.totalPaid || 0);
}
function getDeferredAmount(c){
  if(typeof c.deferredTotal === "number") return Number(c.deferredTotal || 0);
  if(!c.ledger) return 0;
  let total=0;
  for(const e of c.ledger){
    if(e.type==="charge" && e.deferred) total += Number(e.amount || 0);
  }
  return total;
}
// FIFO-allocates payments against non-deferred, non-excluded charges in
// chronological order, same rule getEffectiveBalance uses. Returns each
// still-owed charge's period note and the amount of it left unpaid (a
// charge can be partially covered by leftover payment credit).
function getOwedBreakdown(entries){
  const chrono=[...entries].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  let pay=0;
  for(const e of chrono) if(e.type==="payment") pay+=Number(e.amount||0);
  const owed=[];
  for(const e of chrono){
    if(e.type!=="charge" || e.deferred || isChargeExcluded(e)) continue;
    const amt=Number(e.amount||0);
    if(pay>=amt){ pay-=amt; continue; }
    owed.push({note:e.note, remaining:amt-pay});
    pay=0;
  }
  return owed;
}
// Overdue = owed charges from periods before the citizen's own most
// recently-charged period (mirrors "previous-period unpaid charges that
// aren't deferred"). Periods are typed free text ("MAY2", "April 2026",
// historical imports, ...) with no reliable shared ordering, so this uses
// getOwedBreakdown's chronological (createdAt) order instead of parsing
// period names: the last owed charge entered is "current due", anything
// owed before it is overdue.
function getOverdueBreakdown(entries, precomputedOwed){
  const owed=precomputedOwed || getOwedBreakdown(entries);
  if(!owed.length) return {overdue:0, currentDue:0};
  const currentDue = owed[owed.length-1].remaining;
  const overdue = owed.slice(0,-1).reduce((s,o)=>s+o.remaining,0);
  return {overdue, currentDue};
}
const statusLabel = {paid:"Cleared", partial:"Partly paid", due:"Due"};
function todayISO(){ return new Date().toISOString().slice(0,10); }
function monthLabel(){ return new Date().toLocaleString("en-IN",{month:"long",year:"numeric"}); }
const DATE_DISPLAY_CUTOFF = "2026-07-01";
function displayDate(date){ return (date && date >= DATE_DISPLAY_CUTOFF) ? date : ""; }
function prettyPeriod(note){
  return String(note||"").trim();
}
function entryLabel(e){
  if(!e || !e.type) return "Unknown";
  if(e.type==="payment"){
    const note=e.note;
    const modes=["cash","bank","upi"];
    if(note && modes.includes(note.toLowerCase())) return note.charAt(0).toUpperCase()+note.slice(1).toLowerCase();
    return "Payment";
  }
  if(e.type==="forgive") return "Waived";
  if(e.type==="sanitationFee") return "Sanitation Fee";
  return prettyPeriod(e.note) || "Contribution";
}
function suffixOf(s){ s=String(s||"").trim(); const i=s.lastIndexOf("/"); return (i>=0?s.slice(i+1):s).trim().toLowerCase(); }
function fullKey(s){ return (String(s||"").trim().replace(/\//g,"%2F").replace(/^\.+$/,"_")) || "_"; }
function seqNum(s){ const n=parseInt(String(s==null?"":s).replace(/[^0-9]/g,""),10); return isNaN(n)?Number.MAX_SAFE_INTEGER:n; }
function byCardNo(a,b){ const d=seqNum(a.cardNo)-seqNum(b.cardNo); return d!==0?d:String(a.jobCard||a.id).localeCompare(String(b.jobCard||b.id)); }

/* ============================================================
   DATA LAYER with PERMANENT MIGRATION
   ============================================================ */
function makeLocalStore(){
  const KEY="nsn_contrib_v1";
  let data=null;
  try{ const raw=localStorage.getItem(KEY); if(raw) data=JSON.parse(raw); }catch(e){}
  if(!data) data=seedData();

  // --- PERMANENT MIGRATION: add entryId and save ---
  let migrated = false;
  for(const [id, c] of Object.entries(data.citizens)){
    if(c.ledger){
      let needPersist = false;
      for(let i=0; i<c.ledger.length; i++){
        if(!c.ledger[i].entryId){
          c.ledger[i].entryId = String(Date.now() + Math.random() * 10000) + '-' + i;
          needPersist = true;
        }
      }
      if(needPersist) migrated = true;
    }
  }
  if(migrated) {
    try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
    console.log("Local migration complete: added entryId to all ledger entries.");
  }
  // --- end migration ---

  let clock = Date.now();
  const listeners=new Set();
  const authCbs=new Set();
  let loggedIn=false;
  const persist=()=>{ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){} };
  const sortedList=()=>Object.entries(data.citizens)
    .map(([id,c])=>({ id, jobCard:c.jobCard, cardNo:c.cardNo, name:c.name, phone:c.phone,
                      totalCharged:c.totalCharged, totalPaid:c.totalPaid, balance:c.balance, deferredTotal:c.deferredTotal||0 }))
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const notify=()=>listeners.forEach(cb=>cb(sortedList()));
  function recalcTotals(c){
    let tc=0, tp=0, dt=0;
    for(const e of (c.ledger||[])){
      if(e.type==="charge" || e.type==="sanitationFee"){
        if(e.deferred) dt += e.amount;
        else tc += e.amount;
      } else if(e.type==="payment"){
        tp += e.amount;
      } else if(e.type==="forgive"){
        tc -= e.amount;
      }
    }
    c.totalCharged = tc + dt;
    c.totalPaid = tp;
    c.deferredTotal = dt;
    c.balance = tc - tp;
    return c;
  }
  return {
    isLocal:true,
    async getCitizen(id){ const c=data.citizens[id]; return c? {...c, ledger:undefined} : null; },
    async getLedger(id){ const c=data.citizens[id]; if(!c) return [];
      return [...(c.ledger||[])].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)); },
    subscribe(cb){ listeners.add(cb); cb(sortedList()); return ()=>listeners.delete(cb); },
    async listOwing(){
      const list=[]; 
      for(const [id,c] of Object.entries(data.citizens)){
        const effBal = getEffectiveBalance(c);
        if(effBal > 0) list.push({ id, jobCard:c.jobCard, cardNo:c.cardNo, name:c.name,
                          totalCharged:c.totalCharged, totalPaid:c.totalPaid, balance:effBal });
      }
      return list;
    },
    async exists(id){ return !!data.citizens[id]; },
    async addCitizen(id, d){ data.citizens[id]={...d, ledger:[], pendingPayments:[], createdAt:++clock, updatedAt:++clock}; persist(); notify(); },
    async addEntry(id, type, amount, note, date, deferred=false){
      const c=data.citizens[id]; if(!c) throw new Error("missing");
      const entryId = String(++clock);
      const entry = { entryId, type, amount, note, date, deferred: deferred || false, createdAt: clock };
      if(!c.ledger) c.ledger=[];
      c.ledger.push(entry);
      recalcTotals(c);
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async toggleDefer(id, entryId, deferred){
      const c=data.citizens[id]; if(!c) return;
      const idx = c.ledger.findIndex(e => e.entryId === entryId);
      if(idx<0 || c.ledger[idx].type!=="charge") return;
      c.ledger[idx].deferred = deferred;
      recalcTotals(c);
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async forgiveDebt(id, amount, note){
      const c=data.citizens[id]; if(!c) throw new Error("missing");
      const entryId = String(++clock);
      const entry = { entryId, type:"forgive", amount, note, date:todayISO(), deferred:false, createdAt:clock };
      c.ledger.push(entry);
      recalcTotals(c);
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async addPendingPayment(id, amount){
      const c=data.citizens[id]; if(!c) throw new Error("missing");
      if(!c.pendingPayments) c.pendingPayments=[];
      const pp = { id:String(++clock), amount, date:todayISO(), status:"pending", createdAt:clock };
      c.pendingPayments.push(pp);
      c.updatedAt=++clock; persist(); notify();
      return pp;
    },
    async confirmPendingPayment(id, pendingId){
      const c=data.citizens[id]; if(!c) return;
      const idx = c.pendingPayments.findIndex(p=>p.id===pendingId);
      if(idx<0) return;
      const pp = c.pendingPayments[idx];
      if(pp.status!=="pending") return;
      const entryId = String(++clock);
      const entry = { entryId, type:"payment", amount:pp.amount, note:"UPI", date:pp.date, deferred:false, createdAt:clock };
      c.ledger.push(entry);
      recalcTotals(c);
      pp.status="confirmed";
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async deleteEntry(id, entryId){
      const c=data.citizens[id]; if(!c) return;
      const idx = c.ledger.findIndex(e => e.entryId === entryId);
      if(idx<0) return;
      c.ledger.splice(idx,1);
      recalcTotals(c);
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async editEntry(id, entryId, updates){
      const c=data.citizens[id]; if(!c) return;
      const idx = c.ledger.findIndex(e => e.entryId === entryId);
      if(idx<0) return;
      const e = c.ledger[idx];
      if(updates.amount!==undefined) e.amount=updates.amount;
      if(updates.note!==undefined) e.note=updates.note;
      if(updates.date!==undefined) e.date=updates.date;
      recalcTotals(c);
      c.updatedAt=++clock; persist(); notify(); invalidateLedgerCache(id);
    },
    async getPendingPayments(){
      const all=[];
      for(const [id,c] of Object.entries(data.citizens)){
        for(const p of (c.pendingPayments||[])){
          if(p.status==="pending") all.push({ citizenId:id, ...p, name:c.name, jobCard:c.jobCard });
        }
      }
      return all;
    },
    async deleteCitizen(id){ delete data.citizens[id]; persist(); notify(); invalidateLedgerCache(id); },
    async bulkImport(rows, onProgress){
      let n=0;
      for(const r of rows){
        data.citizens[r.id] = {
          jobCard:r.jobCard, cardNo:r.cardNo, name:r.name, phone:r.phone||"",
          totalCharged:r.totalCharged, totalPaid:r.totalPaid, balance:r.balance, deferredTotal:0,
          createdAt:++clock, updatedAt:++clock,
          ledger:(r.ledger||[]).map(e=>({ entryId:e.entryId || String(++clock), type:e.type, amount:e.amount, note:e.note, date:e.date,
                                          deferred:e.deferred||false, createdAt:e.when? e.when.getTime() : ++clock })),
          pendingPayments:[]
        };
        recalcTotals(data.citizens[r.id]);
        if((++n % 50)===0 && onProgress) onProgress(n, rows.length);
      }
      persist(); notify(); invalidateLedgerCache(); if(onProgress) onProgress(rows.length, rows.length);
      return rows.length;
    },
    async bulkAppendCharges(items, onProgress){
      let n=0;
      for(const it of items){
        let c=data.citizens[it.id];
        if(!c){ c={ jobCard:it.jobCard, cardNo:it.cardNo, name:it.name, phone:"",
                    totalCharged:0, totalPaid:0, balance:0, deferredTotal:0, createdAt:++clock, updatedAt:++clock, ledger:[], pendingPayments:[] };
                data.citizens[it.id]=c; }
        const isDeferred = it.deferred || false;
        const entryId = String(++clock);
        c.ledger.push({ entryId, type:"charge", amount:it.amount, note:it.note, date:"", deferred:isDeferred, deferSource:it.deferSource||null, createdAt:clock });
        recalcTotals(c);
        c.updatedAt=++clock;
        if((++n % 50)===0 && onProgress) onProgress(n, items.length);
      }
      persist(); notify(); invalidateLedgerCache(); if(onProgress) onProgress(items.length, items.length);
      return items.length;
    },
    async bulkAppendPayments(items, onProgress){
      let n=0;
      for(const it of items){
        const c=data.citizens[it.id]; if(!c) continue;
        const entryId = String(++clock);
        c.ledger.push({ entryId, type:"payment", amount:it.amount, note:it.note, date:it.date||"", deferred:false, createdAt:clock });
        recalcTotals(c);
        c.updatedAt=++clock;
        if((++n % 50)===0 && onProgress) onProgress(n, items.length);
      }
      persist(); notify(); invalidateLedgerCache(); if(onProgress) onProgress(items.length, items.length);
      return items.length;
    },
    async signIn(email, pass){
      if(pass !== "dev-mode-only") throw new Error("Invalid credentials for test mode. Use password: dev-mode-only");
      loggedIn=true;
      authCbs.forEach(cb=>cb(true));
      console.warn("⚠️ Test mode login - for development only. This app should run against Firebase in production.");
    },
    signOut(){ loggedIn=false; authCbs.forEach(cb=>cb(false)); },
    onAuth(cb){ authCbs.add(cb); cb(loggedIn); },
    async exportOwingCsv(){
      const owing = await this.listOwing();
      const ledgers = await Promise.all(owing.map(c=>this.getLedger(c.id)));
      let csv = "Name,Job Card,Outstanding (₹),Payment History\n";
      for(let i=0;i<owing.length;i++){
        const c=owing[i];
        const payments = ledgers[i].filter(e=>e.type==="payment").map(e=>`${entryLabel(e)} ${fmt(e.amount)}`).join("; ");
        csv += `"${esc(c.name)}","${esc(c.jobCard)}",${c.balance},"${esc(payments)}"\n`;
      }
      return csv;
    },
    async exportAll(){
      const citizens = Object.entries(data.citizens).map(([id,c])=>({
        id, jobCard:c.jobCard, cardNo:c.cardNo, name:c.name, phone:c.phone||"",
        totalCharged:c.totalCharged||0, totalPaid:c.totalPaid||0, balance:c.balance||0, deferredTotal:c.deferredTotal||0,
        ledger:(c.ledger||[]).map(e=>({ entryId:e.entryId, type:e.type, amount:e.amount, note:e.note,
          date:e.date||"", deferred:e.deferred||false, createdAtMs: typeof e.createdAt==="number"? e.createdAt : null }))
      }));
      return { app:"nsnvc-contribution", version:1, exportedAt:new Date().toISOString(), count:citizens.length, citizens };
    },
    async deleteAll(onProgress){
      data.citizens = {};
      data.meta = { periods: [], deferredUploads: [] };
      persist(); notify();
      if(onProgress) onProgress(1, 1);
    },
    async renamePeriod(oldPeriod, newPeriod, onProgress){
      let count=0;
      for(const [id,c] of Object.entries(data.citizens)){
        if(c.ledger){
          for(const e of c.ledger){
            if(e.type==="charge" && e.note===oldPeriod){
              e.note=newPeriod;
              count++;
            }
          }
        }
      }
      persist(); notify();
      if(onProgress) onProgress(count, count);
      return count;
    },
    async getAllPeriods(){
      const periods=new Set();
      for(const [id,c] of Object.entries(data.citizens)){
        if(c.ledger){
          for(const e of c.ledger){
            if(e.type==="charge" && e.note) periods.add(e.note);
          }
        }
      }
      return Array.from(periods).sort();
    },
    async getExcludedPeriods(){
      return (data.meta && data.meta.excludedPeriods) ? data.meta.excludedPeriods.slice() : [];
    },
    async setExcludedPeriods(periods){
      if(!data.meta) data.meta={};
      data.meta.excludedPeriods=periods;
      persist();
    },
    async importAll(backup, onProgress){
      if(!backup || !Array.isArray(backup.citizens)) throw new Error("Not a valid backup file");
      const validTypes = ["charge", "payment", "forgive", "sanitationFee"];
      let done=0;
      for(const r of backup.citizens){
        const ledger = (r.ledger||[])
          .filter(e => e && validTypes.includes(e.type) && e.amount)
          .map(e=>{
            const amt = Number(e.amount);
            if(isNaN(amt) || amt <= 0) return null;
            return { entryId:e.entryId||String(++clock), type:e.type, amount:amt, note:e.note||"",
              date:e.date||"", deferred:e.deferred||false, createdAt:(e.createdAtMs||++clock) };
          })
          .filter(e => e !== null);
        data.citizens[r.id]={ jobCard:r.jobCard, cardNo:r.cardNo, name:r.name, phone:r.phone||"",
          totalCharged:r.totalCharged||0, totalPaid:r.totalPaid||0, balance:r.balance||0, deferredTotal:r.deferredTotal||0,
          createdAt:++clock, updatedAt:++clock, pendingPayments:[], ledger };
        recalcTotals(data.citizens[r.id]);
        if((++done % 50)===0 && onProgress) onProgress(done, backup.citizens.length);
      }
      persist(); notify(); invalidateLedgerCache(); if(onProgress) onProgress(backup.citizens.length, backup.citizens.length);
      return backup.citizens.length;
    },
    async getImportedPeriods(){ return (data.meta && data.meta.periods) ? data.meta.periods.slice() : []; },
    async recordImportedPeriod(p){ if(!data.meta) data.meta={periods:[]}; if(!data.meta.periods) data.meta.periods=[];
      if(!data.meta.periods.includes(p)) data.meta.periods.push(p); persist(); },
    async recalcAll(onProgress){
      const ids=Object.keys(data.citizens); let done=0;
      for(const id of ids){ recalcTotals(data.citizens[id]); if((++done%50)===0&&onProgress) onProgress(done, ids.length); }
      persist(); notify(); invalidateLedgerCache(); if(onProgress) onProgress(ids.length, ids.length); return ids.length;
    },
    async migrateEntries(){ return 0; }, // no-op for local
    async getAllLedgers(){
      const out={};
      for(const [id,c] of Object.entries(data.citizens)){ out[id]=[...(c.ledger||[])]; }
      ledgerCache.clear();
      for(const [id,entries] of Object.entries(out)) ledgerCache.set(id,entries);
      periodStatsCache=null;
      return out;
    }
  };
}

async function loadFirebase(cfg){
  const appMod  = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const authMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
  const fsMod   = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  const app  = appMod.initializeApp(cfg);
  const auth = authMod.getAuth(app);
  const db   = fsMod.getFirestore(app);
  return { auth, db, fs:fsMod, au:authMod };
}

function makeFirebaseStore({ auth, db, fs, au }){
  async function migrateEntries(){
    const citizensSnap = await fs.getDocs(fs.collection(db,"citizens"));
    let updated = 0;
    for(const doc of citizensSnap.docs){
      const citizenId = doc.id;
      const ledgerSnap = await fs.getDocs(fs.collection(db,"citizens",citizenId,"ledger"));
      let batch = fs.writeBatch(db);
      let batchCount = 0;
      for(const entryDoc of ledgerSnap.docs){
        const data = entryDoc.data();
        if(!data.entryId){
          batch.update(entryDoc.ref, { entryId: entryDoc.id });
          batchCount++;
          updated++;
        }
        if(batchCount >= 400){
          await batch.commit();
          batch = fs.writeBatch(db);
          batchCount = 0;
        }
      }
      if(batchCount > 0){
        await batch.commit();
      }
    }
    return updated;
  }

  return {
    isLocal:false,
    migrateEntries,
    async getCitizen(id){ const s=await fs.getDoc(fs.doc(db,"citizens",id)); return s.exists()? s.data() : null; },
    async getLedger(id){
      const q=fs.query(fs.collection(db,"citizens",id,"ledger"), fs.orderBy("createdAt","asc"));
      const snap = await fs.getDocs(q);
      return snap.docs.map(d=> {
        const data = d.data();
        if(!data.entryId) data.entryId = d.id;
        return data;
      });
    },
    subscribe(cb){
      const q=fs.query(fs.collection(db,"citizens"), fs.orderBy("name"));
      return fs.onSnapshot(q,
        snap=>{
          try{
            cb(snap.docs.map(d=>({ id:d.id, ...d.data() })));
          } catch(e){
            console.error("Error in subscribe callback:", e);
          }
        },
        error=>{
          console.error("Firestore subscribe error:", error);
        }
      );
    },
    async listOwing(){
      const snap=await fs.getDocs(fs.collection(db,"citizens"));
      if(!excludedPeriods.length){
        return snap.docs
          .map(d=>({ id:d.id, ...d.data(), balance:Number(d.data().balance || 0) }))
          .filter(c=>c.balance>0);
      }
      const ledgerPromises = snap.docs.map(d=>
        fs.getDocs(fs.collection(db,"citizens",d.id,"ledger"))
          .then(ledSnap=>{
            const c=d.data();
            let includedCharged=0;
            ledSnap.docs.forEach(doc=>{
              const e=doc.data();
              if(e.type==="charge" && !e.deferred && !isChargeExcluded(e)){
                includedCharged += Number(e.amount || 0);
              }
            });
            const effBal = includedCharged - Number(c.totalPaid || 0);
            return effBal>0 ? { id:d.id, ...c, balance:effBal } : null;
          })
      );
      const results = await Promise.all(ledgerPromises);
      return results.filter(r=>r!==null);
    },
    async exists(id){ return (await fs.getDoc(fs.doc(db,"citizens",id))).exists(); },
    async addCitizen(id, d){
      if(typeof id !== 'string' || !id) throw new Error("Invalid citizen ID");
      if(!d.name || typeof d.name !== 'string') throw new Error("Citizen name is required");
      if(!d.jobCard || typeof d.jobCard !== 'string') throw new Error("Job card is required");
      await fs.setDoc(fs.doc(db,"citizens",id), {...d, createdAt:fs.serverTimestamp(), updatedAt:fs.serverTimestamp()});
    },
    async addEntry(id, type, amount, note, date, deferred=false){
      const validTypes = ["charge", "payment", "forgive", "sanitationFee"];
      if(!validTypes.includes(type)) throw new Error("Invalid entry type");
      const amt = Number(amount);
      if(!Number.isFinite(amt) || amt <= 0) throw new Error("Amount must be a positive number");
      const eRef=fs.doc(fs.collection(db,"citizens",id,"ledger"));
      await fs.setDoc(eRef, { entryId:eRef.id, type, amount:amt, note:String(note||""), date:String(date||""), deferred, createdAt:fs.serverTimestamp() });
      const entry={ entryId:eRef.id, type, amount:amt, note, date, deferred, createdAt:Date.now() };
      const entries=ledgerCache.get(id)||[];
      entries.push(entry);
      ledgerCache.set(id,entries); periodStatsCache=null;
      const updates={ updatedAt:fs.serverTimestamp() };
      if(type==="charge" || type==="sanitationFee"){
        updates.totalCharged=fs.increment(amt);
        if(deferred) updates.deferredTotal=fs.increment(amt);
        else updates.balance=fs.increment(amt);
      } else if(type==="payment"){
        updates.totalPaid=fs.increment(amt);
        updates.balance=fs.increment(-amt);
      } else if(type==="forgive"){
        updates.totalCharged=fs.increment(-amt);
        updates.balance=fs.increment(-amt);
      }
      await fs.updateDoc(fs.doc(db,"citizens",id),updates);
    },
    async toggleDefer(id, entryId, deferred){
      const ref = fs.doc(db, "citizens", id, "ledger", entryId);
      await fs.updateDoc(ref, { deferred });
      const entries=ledgerCache.get(id)||[];
      const e=entries.find(x=>x.entryId===entryId);
      if(e) e.deferred=deferred;
      ledgerCache.set(id,entries); periodStatsCache=null;
      const amt = e ? Number(e.amount||0) : 0;
      const updates = { updatedAt:fs.serverTimestamp() };
      if(deferred){ updates.balance=fs.increment(-amt); updates.deferredTotal=fs.increment(amt); }
      else { updates.balance=fs.increment(amt); updates.deferredTotal=fs.increment(-amt); }
      await fs.updateDoc(fs.doc(db,"citizens",id),updates);
    },
    async forgiveDebt(id, amount, note){
      await this.addEntry(id, "forgive", amount, note, todayISO());
    },
    async addPendingPayment(id, amount){

      const ref=fs.doc(db,"citizens",id,"ledger",entryId);
      await fs.updateDoc(ref, updates);
      const entries=ledgerCache.get(id)||[];
      const e=entries.find(x=>x.entryId===entryId);

const validTypes = ["charge", "payment", "forgive", "sanitationFee"];

            const amt = Number(e.amount);
            if(isNaN(amt) || amt <= 0) continue;
            const eRef=fs.doc(fs.collection(db,"citizens",r.id,"ledger"));
            batch.set(eRef,{ entryId:e.entryId||eRef.id, type:e.type, amount:amt, note:e.note||"", date:e.date||"", deferred:e.deferred||false,
              createdAt: e.createdAtMs? fs.Timestamp.fromMillis(e.createdAtMs) : fs.serverTimestamp() });
            if(++ops>=400) await flush();
          }
          if((++done % 50)===0 && onProgress) onProgress(2, 3);
        }
        await flush();
        invalidateLedgerCache();
        if(onProgress) onProgress(3, 3);

    async recalcAll(onProgress){
      if(ledgerCache.size===0) await this.getAllLedgers();
      let batch=fs.writeBatch(db), ops=0, done=0;
      const flush=async()=>{ if(ops>0){ await batch.commit(); batch=fs.writeBatch(db); ops=0; } };
      const citizenIds=[...ledgerCache.keys()];
      for(const id of citizenIds){
        const {totalCharged, totalPaid, balance, deferredTotal} = recalcFromLedger(ledgerCache.get(id));
        batch.update(fs.doc(db,"citizens",id),{ totalCharged, totalPaid, balance, deferredTotal, updatedAt:fs.serverTimestamp() }); ops++;
        if(ops>=FIRESTORE_BATCH_SIZE) await flush();
        if((++done%50)===0&&onProgress) onProgress(done, citizenIds.length);
      }
      await flush();
      invalidateLedgerCache();
      if(onProgress) onProgress(citizenIds.length, citizenIds.length);
      return citizenIds.length;
    },
    async getAllLedgers(){
      const cSnap=await fs.getDocs(fs.collection(db,"citizens"));
      const results=await Promise.all(cSnap.docs.map(async d=>{
        const ledSnap=await fs.getDocs(fs.collection(db,"citizens",d.id,"ledger"));
        return [d.id, ledSnap.docs.map(x=>x.data())];
      }));
      ledgerCache.clear();
      for(const [id,entries] of results) ledgerCache.set(id,entries);
      periodStatsCache=null;
      return Object.fromEntries(results);
    }
  };

/* ============================================================
   ADMIN — live citizen list + stats
   ============================================================ */
function subscribeCitizens(){
  if(citizensUnsub) return;
  citizensUnsub = store.subscribe(list=>{
    rawCitizens = list;
    scheduleDashboardRefresh();
  });
}
// Manage Periods excludes charges by period from balance calculations, but the
// live citizen list from subscribe() only carries the cached totals, not each
// household's ledger — so getEffectiveBalance can't apply the exclusion unless
// we attach the ledger ourselves whenever some period is excluded. Note this
// means objects in allCitizens only carry .ledger while some period is
// excluded — any future code reading c.ledger directly (instead of going
// through getEffectiveBalance/getDeferredAmount, which both guard for its
// absence) needs to handle it being missing.
function invalidateLedgerCache(id){
  if(id) ledgerCache.delete(id); else ledgerCache.clear();
  periodStatsCache = null;
}
function recalcFromLedger(entries){
  let tc=0, tp=0, dt=0;
  for(const e of entries){
    if(!e || typeof e.amount === 'undefined') continue;
    const amt = Number(e.amount) || 0;
    if(isNaN(amt)) { console.warn("Invalid amount in ledger entry:", e); continue; }
    if(e.type==="charge" || e.type==="sanitationFee"){ if(e.deferred) dt+=amt; else tc+=amt; }
    else if(e.type==="payment") tp+=amt;
    else if(e.type==="forgive") tc-=amt;
  }
  return { totalCharged:tc+dt, totalPaid:tp, balance:tc-tp, deferredTotal:dt };
}
function getPeriodStats(){
  if(periodStatsCache) return periodStatsCache;
  const periods=new Set(), stats=new Map();
  for(const [cid,entries] of ledgerCache){
    for(const e of entries){
      if(e.type==="charge" && e.note){
        periods.add(e.note);
        const s=stats.get(e.note)||{count:0,amount:0};
        s.count++; s.amount+=Number(e.amount||0);
        stats.set(e.note,s);
      }
    }
  }
  periodStatsCache={periods:[...periods].sort((a,b)=>periodKey(a)-periodKey(b)),stats};
  return periodStatsCache;
}
function scheduleDashboardRefresh(){
  // Coalesces bursts of Firestore snapshot events (e.g. a bulk import
  // triggering many rapid writes) into a single ledger refetch instead of
  // one full refetch per event.
  clearTimeout(dashboardRefreshTimer);
  dashboardRefreshTimer = setTimeout(refreshDashboard, DASHBOARD_REFRESH_DEBOUNCE_MS);
  clearTimeout(cacheRefreshTimer);
  cacheRefreshTimer = setTimeout(()=>{
    if(excludedPeriods.length) store.getAllLedgers().catch(e=>{
      console.warn("Background ledger cache refresh failed:", e);
    });
  }, CACHE_REFRESH_DELAY_MS);
  // The Overdue summary card/tab needs each pending citizen's ledger, which
  // isn't in the live citizen list — same lazy fetch the period dropdown
  // already used, just also kicked off quietly here so the dashboard fills
  // in without waiting for someone to open that dropdown. Debounced so a
  // burst of snapshot events (bulk import, rapid edits) settles first.
  clearTimeout(overdueRefreshTimer);
  overdueRefreshTimer = setTimeout(()=>{
    if(!periodsReady && !loadingPeriods) loadOwedBreakdown();
  }, CACHE_REFRESH_DELAY_MS);
}
async function refreshDashboard(){
  const seq = ++dashboardRefreshSeq;
  let list = rawCitizens || [];
  if(excludedPeriods.length){
    if(ledgerCache.size===0){
      try{ await store.getAllLedgers(); }catch(e){ console.error("Failed to load ledgers:", e); }
    }
    if(list.length > 0) {
      list = list.map(c => ({...c, ledger: ledgerCache.get(c.id) || []}));
    }
  }
  if(seq !== dashboardRefreshSeq) return; // superseded by a newer refresh; drop this stale result
  allCitizens = list;
  // The period dropdown's cache (unpaidCache/periodsReady) was built from
  // whatever allCitizens looked like at the time it was requested. If that
  // happened before the very first citizen list arrived (e.g. someone opens
  // the dropdown right after login), it would otherwise permanently cache an
  // empty result — periodsReady stays true forever with no periods listed.
  // Invalidating it here means the next dropdown focus (or an already-active
  // period filter, re-checked by renderList below) recomputes against
  // current data instead of a possibly-stale/empty snapshot.
  periodsReady = false;
  unpaidCache = new Map();
  renderStats(); renderList(); refreshPending();
}
function renderStats(){
  const pending = allCitizens.filter(c=>getEffectiveBalance(c)>0);
  const out = pending.reduce((s,c)=>s+Math.max(0,getEffectiveBalance(c)),0);
  $("stOut").textContent = fmt(out);
  $("stPendingCount").textContent = `${pending.length} household${pending.length===1?"":"s"} pending`;

  if(periodsReady){
    const {total, count} = overdueTotals();
    $("stOverdue").textContent = fmt(total);
    $("stOverdueCount").textContent = `${count} household${count===1?"":"s"} overdue`;
  } else {
    $("stOverdue").textContent = "…";
    $("stOverdueCount").textContent = loadingPeriods ? "Loading…" : "—";
  }

  const deferred = allCitizens.filter(c=>getDeferredAmount(c)>0);
  const deferredOut = deferred.reduce((s,c)=>s+getDeferredAmount(c),0);
  $("stDeferred").textContent = fmt(deferredOut);
  $("stDeferredCount").textContent = `${deferred.length} household${deferred.length===1?"":"s"} deferred`;

  const overpaid = allCitizens.filter(c=>getEffectiveBalance(c)<0);
  const overpaidOut = overpaid.reduce((s,c)=>s+Math.abs(getEffectiveBalance(c)),0);
  $("stOverpaid").textContent = fmt(overpaidOut);
  $("stOverpaidCount").textContent = `${overpaid.length} household${overpaid.length===1?"":"s"} overpaid`;
}
let adminFilter="pending", adminShown=20;
const ADMIN_STEP=20;
let periodFilter="", unpaidCache=new Map(), periodsReady=false, loadingPeriods=false;
// Overdue/current-due amounts, keyed by citizen id. Populated alongside
// unpaidCache in loadOwedBreakdown() since both need the same per-citizen
// ledger fetch — computing them together avoids doubling that cost.
let overdueCache=new Map();

function periodKey(note){
  const s=String(note||"").trim().toUpperCase();
  const m=s.match(/^(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[A-Z]*\s*([0-9]*)$/);
  if(!m) return 9999;
  const idx={JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12}[m[1]];
  return idx*10 + (m[2]?parseInt(m[2],10):0);
}
function unpaidPeriods(entries){
  return getOwedBreakdown(entries).filter(o=>o.note).map(o=>o.note);
}
async function loadOwedBreakdown(){
  if(loadingPeriods) return; loadingPeriods=true;
  const pend=allCitizens.filter(c=>getEffectiveBalance(c)>0);
  const cache=new Map(), overdue=new Map(), set=new Set();
  await Promise.all(pend.map(async c => {
    try{
      const led=ledgerCache.get(c.id)||await store.getLedger(c.id);
      const owed=getOwedBreakdown(led);
      const up=owed.filter(o=>o.note).map(o=>o.note);
      cache.set(c.id, up); up.forEach(p=>set.add(p));
      overdue.set(c.id, getOverdueBreakdown(null, owed));
    }catch(e){}
  }));
  unpaidCache=cache; overdueCache=overdue; periodsReady=true; loadingPeriods=false;
  const sel=$("periodSel");
  if(sel){
    const periods=[...set].sort((a,b)=>periodKey(a)-periodKey(b));
    sel.innerHTML=`<option value="">All pending (any period)</option>`+
      periods.map(p=>`<option value="${esc(p)}"${p===periodFilter?" selected":""}>Pending: ${esc(prettyPeriod(p))}</option>`).join("");
  }
  renderStats(); renderList();
}
function overdueTotals(){
  let total=0, count=0;
  for(const {overdue} of overdueCache.values()){ if(overdue>0){ total+=overdue; count++; } }
  return {total, count};
}

function filterCitizenList(citizens, searchTerm, filter, periodFilter){
  let list = citizens.slice();
  if(searchTerm){
    list = list.filter(c => (c.jobCard||c.id).toLowerCase().includes(searchTerm) || (c.name||"").toLowerCase().includes(searchTerm));
  } else if(filter==="pending"){
    list = list.filter(c => getEffectiveBalance(c)>0);
    if(periodFilter){
      if(!periodsReady && !loadingPeriods) loadOwedBreakdown();
      list = list.filter(c => (unpaidCache.get(c.id)||[]).includes(periodFilter));
    }
  } else if(filter==="overdue"){
    if(!periodsReady && !loadingPeriods) loadOwedBreakdown();
    list = list.filter(c => (overdueCache.get(c.id)?.overdue||0)>0);
  } else if(filter==="deferred"){
    list = list.filter(c => getDeferredAmount(c)>0);
  } else if(filter==="overpaid"){
    list = list.filter(c => getEffectiveBalance(c)<0);
  }
  list.sort(byCardNo);
  return list;
}

function buildCitizenCardHTML(citizen, filter){
  const bal = getEffectiveBalance(citizen);
  const deferred = getDeferredAmount(citizen);
  const st = statusOf(citizen);
  let small, balText, balColor;

  if(filter==="overdue"){
    const overdueAmt = overdueCache.get(citizen.id)?.overdue||0;
    small = `${esc(citizen.jobCard||citizen.id)} · Overdue`;
    balText = fmt(overdueAmt);
    balColor = 'var(--due)';
  } else if(filter==="deferred"){
    small = `${esc(citizen.jobCard||citizen.id)} · Deferred ${fmt(deferred)}`;
    balText = fmt(deferred);
    balColor = 'var(--partial)';
  } else if(filter==="overpaid"){
    small = `${esc(citizen.jobCard||citizen.id)} · Overpaid`;
    balText = fmt(Math.abs(bal));
    balColor = 'var(--paid)';
  } else {
    small = esc(citizen.jobCard||citizen.id);
    balColor = bal>0 ? 'var(--due)' : 'var(--paid)';
    balText = bal<0 ? `₹0 (+${fmt(Math.abs(bal))})` : fmt(Math.max(0,bal));
  }

  return `<div class="citizen-row" data-id="${esc(citizen.id)}" style="display:flex;align-items:center;gap:10px;padding:12px 15px;border-top:1px solid var(--border);width:100%;cursor:pointer">

  </div>`;
}

function handlePeriodRename(btn, row, pendingRenames, updateSaveBtn){
  const oldName = btn.dataset.period;
  if(pendingRenames.has(oldName)){
    pendingRenames.delete(oldName);
    row.classList.remove("period-row-renamed");
    row.querySelector(".period-name").innerHTML=`<b style="font-size:14px">${esc(prettyPeriod(oldName))}</b>`;
    btn.textContent="✏️";
    updateSaveBtn(pendingRenames);
    return;
  }

  row.classList.add("period-row-renamed");
  row.querySelector(".period-name").innerHTML=`<input class="period-rename-input" value="${esc(oldName)}">`;
  btn.textContent="✕";
  const input = row.querySelector(".period-rename-input");
  input.focus(); input.select();

  function applyRename(){
    const newVal = input.value.trim();
    if(newVal && newVal !== oldName){
      pendingRenames.set(oldName, newVal);
      row.querySelector(".period-name").innerHTML=`<b style="font-size:14px">${esc(prettyPeriod(oldName))}</b> → <b style="font-size:14px;color:var(--green)">${esc(prettyPeriod(newVal))}</b>`;
      btn.textContent="✕";
    } else {
      pendingRenames.delete(oldName);
      row.classList.remove("period-row-renamed");
      row.querySelector(".period-name").innerHTML=`<b style="font-size:14px">${esc(prettyPeriod(oldName))}</b>`;
      btn.textContent="✏️";
    }
    updateSaveBtn(pendingRenames);
  }

  input.addEventListener("keydown", e=>{
    if(e.key==="Enter") applyRename();
    if(e.key==="Escape"){
      pendingRenames.delete(oldName);
      row.classList.remove("period-row-renamed");
      row.querySelector(".period-name").innerHTML=`<b style="font-size:14px">${esc(prettyPeriod(oldName))}</b>`;
      btn.textContent="✏️";
      updateSaveBtn(pendingRenames);
    }
  });
  input.addEventListener("blur", applyRename);
}

async function handlePeriodsSave(pendingRenames){

  try{
    const excl=[];
    document.querySelectorAll(".period-toggle").forEach(t=>{ if(!t.checked) excl.push(t.value); });
    await store.setExcludedPeriods(excl);
    excludedPeriods=excl; periodsReady=false; unpaidCache=new Map();
    if(periodFilter && excludedPeriods.includes(periodFilter)) periodFilter="";
    const renameResults = await Promise.all(
      Array.from(pendingRenames).map(([oldName,newName])=>store.renamePeriod(oldName,newName))
    );
    const renamed = renameResults.reduce((sum,n)=>sum+n,0);
    pendingRenames.clear();
    msg.innerHTML=`<div class="notice info" style="background:var(--green-soft);color:var(--green-dark)">Done — ${excl.length} exclusions, ${renamed} rename${renamed===1?"":"s"}.</div>`;
    toast("Periods updated");
    await refreshDashboard(); loadOwedBreakdown();
  }catch(err){
    console.error(err);
    msg.innerHTML='<div class="notice err">Failed to save.</div>';
    btn.disabled=false;
  }
}

async function savePeriods(){

async function encryptBackupData(data, password){
  if(!password) return JSON.stringify(data);
  try{
    const encoder = new TextEncoder();
    const dataStr = JSON.stringify(data);
    const dataBytes = encoder.encode(dataStr);
    const saltBytes = crypto.getRandomValues(new Uint8Array(16));
    const pwBytes = encoder.encode(password);
    const keyMaterial = await crypto.subtle.importKey("raw", pwBytes, {name:"PBKDF2"}, false, ["deriveBits"]);
    const keyBits = await crypto.subtle.deriveBits({name:"PBKDF2", salt:saltBytes, iterations:100000, hash:"SHA-256"}, keyMaterial, 256);
    const key = await crypto.subtle.importKey("raw", keyBits, {name:"AES-GCM"}, false, ["encrypt"]);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encrypted = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, dataBytes);
    const container = {v:1, salt:Array.from(saltBytes), iv:Array.from(iv), data:Array.from(new Uint8Array(encrypted))};
    return JSON.stringify(container);
  }catch(e){
    console.error("Encryption failed:", e);
    throw new Error("Backup encryption failed");
  }
}

function validateBackupSchema(backup) {
  if (!backup || typeof backup !== 'object') throw new Error("Backup must be an object");
  if (!Array.isArray(backup.citizens)) throw new Error("Backup must contain citizens array");
  if (backup.citizens.length > BACKUP_MAX_HOUSEHOLDS) throw new Error(`Backup too large (max ${BACKUP_MAX_HOUSEHOLDS} households)`);

  const validTypes = ["charge", "payment", "forgive", "sanitationFee"];
  for (let i = 0; i < backup.citizens.length; i++) {
    const c = backup.citizens[i];
    if (typeof c.id !== 'string' || !c.id) throw new Error(`Citizen ${i}: missing or invalid id`);
    if (typeof c.name !== 'string') throw new Error(`Citizen ${i}: missing or invalid name`);
    if (!Number.isFinite(c.totalCharged) || !Number.isFinite(c.totalPaid) || !Number.isFinite(c.balance)) {
      throw new Error(`Citizen ${i}: invalid numeric fields`);
    }

    if (Array.isArray(c.ledger)) {
      for (let j = 0; j < c.ledger.length; j++) {
        const e = c.ledger[j];
        if (!validTypes.includes(e.type)) throw new Error(`Citizen ${i}, entry ${j}: invalid type`);
        if (!Number.isFinite(e.amount) || e.amount < 0) throw new Error(`Citizen ${i}, entry ${j}: invalid amount`);
        if (typeof e.note !== 'string') e.note = '';
        if (typeof e.date !== 'string') e.date = '';
      }
    }
  }
}

async function decryptBackupData(dataStr, password){
  try{
    const container = JSON.parse(dataStr);
    if(!container.v || !container.salt || !container.iv || !container.data) throw new Error("Invalid encrypted backup format");
    const encoder = new TextEncoder();
    const saltBytes = new Uint8Array(container.salt);
    const ivBytes = new Uint8Array(container.iv);
    const encryptedBytes = new Uint8Array(container.data);
    const pwBytes = encoder.encode(password);
    const keyMaterial = await crypto.subtle.importKey("raw", pwBytes, {name:"PBKDF2"}, false, ["deriveBits"]);
    const keyBits = await crypto.subtle.deriveBits({name:"PBKDF2", salt:saltBytes, iterations:100000, hash:"SHA-256"}, keyMaterial, 256);
    const key = await crypto.subtle.importKey("raw", keyBits, {name:"AES-GCM"}, false, ["decrypt"]);
    const decrypted = await crypto.subtle.decrypt({name:"AES-GCM", iv:ivBytes}, key, encryptedBytes);
    const decryptedStr = new TextDecoder().decode(decrypted);
    return JSON.parse(decryptedStr);
  }catch(e){
    console.error("Decryption failed:", e);
    throw new Error("Decryption failed - wrong password or corrupted file");
  }
}

async function ensureXLSX(){
  if(window.XLSX) return window.XLSX;
  try {
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.integrity="sha512-r22gChDnGvBylk90+2e/ycr3RVrDi8DIOkIGNhJlKfuyQM4tIRAI062MaV8sfjQKYVGjOBaZBOA87z+IhZE9DA==";
      s.crossOrigin="anonymous";
      s.onload=res;
      s.onerror=()=>rej(new Error("integrity check failed"));
      document.head.appendChild(s);
    });
  } catch(e) {
    console.warn("XLSX load with integrity failed, retrying without integrity:", e);
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.onload=res;
      s.onerror=()=>rej(new Error("xlsx load failed"));
      document.head.appendChild(s);
    });
  }
  return window.XLSX;
}

function colOptions(header, sample, selected){
  const n=Math.max(header.length, sample?sample.length:0);
  let opts=`<option value="-1"${selected<0?" selected":""}>— none —</option>`;
  for(let i=0;i<n;i++){
    const raw=header[i];
    const name=(raw!=null && String(raw).trim()) ? String(raw).trim() : `Column ${String.fromCharCode(65+(i%26))}`;
    const s=(sample && sample[i]!=null) ? String(sample[i]).slice(0,20) : "";
    opts+=`<option value="${i}"${i===selected?" selected":""}>${esc(name)}${s?` — e.g. ${esc(s)}`:""}</option>`;
  }
  return opts;
}

function buildUploadItems(){
  if(!uploadRaw) return;
  const cFull=parseInt($("mapJob").value,10);
  const cName=parseInt($("mapName").value,10);
  const cCharge=parseInt($("mapCharge").value,10);
  const cPayment=parseInt($("mapPayment").value,10);
  const cMode=parseInt($("mapMode").value,10);
  if(!(cFull>=0)){ $("mapMsg").innerHTML=`<div class="notice err">Choose Job card column.</div>`; return; }
  if(!(cCharge>=0) && !(cPayment>=0)){ $("mapMsg").innerHTML=`<div class="notice err">Choose at least a Charge or Payment column.</div>`; return; }
  const rows=uploadRaw.rows;
  const charges=[]; const payments=[]; const notFound=[]; const ambiguous=[];
  let chargeAmt=0, payAmt=0;
  for(let r=1;r<rows.length;r++){ const row=rows[r]; if(!row) continue;
    const full=String(row[cFull]||"").trim(); if(!full) continue;
    const nm=String(row[cName>=0?cName:1]||"").trim();
    const cand=resolveCitizen(full);
    if(cand.length===1){
      const id=cand[0].id;
      const chargeAmtVal = cCharge>=0 ? _num(row[cCharge]) : 0;
      const payAmtVal = cPayment>=0 ? _num(row[cPayment]) : 0;
      const modeVal = cMode>=0 ? String(row[cMode]||"").trim().toLowerCase() : "";
      
      if(chargeAmtVal>0){
        charges.push({ id, jobCard:full, cardNo:suffixOf(full), name:nm, amount:chargeAmtVal }); chargeAmt+=chargeAmtVal;
      }
      if(payAmtVal>0){
        const note = modeVal.includes("upi") ? "UPI" : modeVal.includes("cash") ? "Cash" : "Bank";
        payments.push({ id, amount:payAmtVal, name:nm, jobCard:full, note }); payAmt+=payAmtVal;
      }
    }else if(cand.length>1){ ambiguous.push(full+(nm?" ("+nm+")":"")); }
    else { notFound.push(full+(nm?" ("+nm+")":"")); }
  }
  if(!charges.length && !payments.length && !notFound.length && !ambiguous.length){ $("mapMsg").innerHTML=`<div class="notice err">No rows with an amount found.</div>`; return; }
  pendingUpload={charges,payments};
  const issues = [...ambiguous.map(x=>"⚠︎ "+x+" — number matches more than one person"),
                  ...notFound.map(x=>"• "+x+" — not found")];
  $("impMsg").innerHTML=`<div class="notice info">Review and confirm the upload.</div>`;
  $("impPreview").innerHTML=`
    <div class="panel" style="margin-top:12px">
      <div class="brow"><span>Charges to add</span><b>${charges.length}</b></div>
      <div class="brow"><span>Payments to record</span><b>${payments.length}</b></div>
      <div class="brow"><span>Not matched (skipped)</span><b>${notFound.length}</b></div>
      <div class="brow"><span>Ambiguous (skipped)</span><b>${ambiguous.length}</b></div>
      <div class="brow total"><span>Total charges</span><b class="money">${fmt(chargeAmt)}</b></div>
      <div class="brow total"><span>Total payments</span><b class="money">${fmt(payAmt)}</b></div>
    </div>
    ${issues.length?`<div class="panel" style="max-height:160px;overflow:auto"><h4>Skipped rows</h4>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.7">${issues.map(esc).join("<br>")}</div></div>`:``}
    <button class="btn block" id="impConfirm" ${(charges.length||payments.length)?"":"disabled"}>Process ${charges.length} charges and ${payments.length} payments</button>
    <div id="impProgress" style="margin-top:10px"></div>`;
  if($("impConfirm")) $("impConfirm").addEventListener("click", runUpload);
}

async function runUpload(){
  if(!pendingUpload) return;
  const period=$("impPeriod").value.trim();
  const dateStr=$("impDate").value || todayISO();
  const btn=$("impConfirm"); btn.disabled=true; const prog=$("impProgress");
  prog.innerHTML=`<div class="notice info">Processing…</div>`;
  try{
    let done=0, total=pendingUpload.charges.length+pendingUpload.payments.length;
    if(pendingUpload.charges.length && !period){
      prog.innerHTML=`<div class="notice err">Please type the period name above for charges.</div>`;
      $("impPeriod").focus();
      btn.disabled=false;
      return;
    }
    if(pendingUpload.charges.length){
      const chargeItems=pendingUpload.charges.map(it=>({...it, note:period}));
      await store.bulkAppendCharges(chargeItems,(d,t)=>{ done=d; prog.innerHTML=`<div class="notice info">Processing charges… ${d} / ${t}</div>`; });
      try{ await store.recordImportedPeriod(period); }catch(e){}
    }
    if(pendingUpload.payments.length){
      const when=new Date(dateStr+"T12:00:00");

      await store.bulkAppendPayments(payItems,(d,t)=>{ done=pendingUpload.charges.length+d; prog.innerHTML=`<div class="notice info">Processing payments… ${d} / ${t}</div>`; });
    }
    clearOperationErrors();
    prog.innerHTML=`<div class="notice info" style="background:var(--green-soft);color:var(--green-dark)">Done — ${pendingUpload.charges.length} charges and ${pendingUpload.payments.length} payments processed. Recalculating balances…</div>`;

    store.recalcAll().then(()=>toast("Balances recalculated")).catch(e=>console.error("recalcAll after upload failed:", e));
    setTimeout(()=>{ closeSheet(); toast("Upload complete"); },SHEET_CLOSE_DELAY_MS);
  }catch(err){
    handleOperationError("bulkUpload", err);
    prog.innerHTML=`<div class="notice err">Update failed partway. Check connection and try again.</div>`;
    btn.disabled=false;
  }
}

  if(!bankRaw) return;
  const cFull=parseInt($("mapJob").value,10);
  const cName=parseInt($("mapName").value,10);
  const cAmt=parseInt($("mapAmt").value,10);
  if(!(cFull>=0) || !(cAmt>=0)){ $("mapMsg").innerHTML=`<div class="notice err">Choose at least the Job card column and the Amount column.</div>`; return; }
  const rows=bankRaw.rows;
  const items=[]; const notFound=[]; const ambiguous=[];
  let totAmt=0;
  for(let r=1;r<rows.length;r++){ const row=rows[r]; if(!row) continue;
    const val=String(row[cFull]||"").trim(); if(!val) continue;
    const amt=_num(row[cAmt]); if(amt<=0) continue;
    const nm=String(row[cName>=0?cName:1]||"").trim();
    const cand=resolveCitizen(val);
    if(cand.length===1){ items.push({ id:cand[0].id, amount:amt }); totAmt+=amt; }
    else if(cand.length>1){ ambiguous.push(val+(nm?" ("+nm+")":"")); }
    else { notFound.push(val+(nm?" ("+nm+")":"")); }
  }
  if(!items.length && !notFound.length && !ambiguous.length){ $("mapMsg").innerHTML=`<div class="notice err">No rows with an amount found.</div>`; return; }
  pendingBank={items};
  const issues = [...ambiguous.map(x=>"⚠︎ "+x+" — number matches more than one person"),
                  ...notFound.map(x=>"• "+x+" — not found")];
  $("impMsg").innerHTML=`<div class="notice info">Review and confirm the bank payments.</div>`;
  $("impPreview").innerHTML=`
    <div class="panel" style="margin-top:12px">
      <div class="brow"><span>Payments to record</span><b>${items.length}</b></div>
      <div class="brow"><span>Not matched (skipped)</span><b>${notFound.length}</b></div>
      <div class="brow"><span>Ambiguous (skipped)</span><b>${ambiguous.length}</b></div>
      <div class="brow total"><span>Total being paid</span><b class="money">${fmt(totAmt)}</b></div>
    </div>
    ${issues.length?`<div class="panel" style="max-height:160px;overflow:auto"><h4>Skipped rows</h4>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.7">${issues.map(esc).join("<br>")}</div></div>`:``}
    <button class="btn block" id="impConfirm" ${items.length?"":"disabled"}>Record ${items.length} bank payments</button>
    <div id="impProgress" style="margin-top:10px"></div>`;
  if($("impConfirm")) $("impConfirm").addEventListener("click", runBank);
}

async function runBank(){
  if(!pendingBank) return;
  const dateStr=$("impDate").value || todayISO();
  const when=new Date(dateStr+"T12:00:00");
  const items=pendingBank.items.map(it=>({...it, note:"Bank", date:dateStr, when}));
  const btn=$("impConfirm"); btn.disabled=true; const prog=$("impProgress");
  prog.innerHTML=`<div class="notice info">Recording… 0 / ${items.length}</div>`;
  try{
    await store.bulkAppendPayments(items,(d,t)=>{ prog.innerHTML=`<div class="notice info">Recording… ${d} / ${t}</div>`; });
    prog.innerHTML=`<div class="notice info" style="background:var(--green-soft);color:var(--green-dark)">Done — ${items.length} bank payments recorded. Recalculating balances…</div>`;
    pendingBank=null;
    store.recalcAll().then(()=>toast("Balances recalculated")).catch(e=>console.error("recalcAll after bank upload failed:", e));
    setTimeout(()=>{ closeSheet(); toast("Bank payments recorded"); },SHEET_CLOSE_DELAY_MS);
  }catch(err){ console.error(err); prog.innerHTML=`<div class="notice err">Recording failed partway. Check connection and try again.</div>`; btn.disabled=false; }
}

        <div class="sheet-body">${bodyHTML}</div>

    </div>`;
  document.body.style.overflow="hidden";

  $("closeSheet").addEventListener("click", closeSheet);
}
function closeSheet(){ $("modalRoot").innerHTML=""; document.body.style.overflow=""; }
function confirmAction(message, danger=false){
  return new Promise(resolve=>{
    const ov=document.createElement("div");
    ov.className="confirm-overlay";
    ov.innerHTML=`<div class="confirm-box">
      <div class="confirm-msg"></div>
      <div class="confirm-btns">
        <button class="btn small ghost" data-a="no">Cancel</button>
        <button class="btn small" data-a="yes"${danger?' style="background:var(--due)"':''}>Confirm</button>
      </div>
    </div>`;
    ov.querySelector(".confirm-msg").textContent = message;
    document.body.appendChild(ov);
    const done=v=>{ ov.remove(); resolve(v); };
    ov.addEventListener("click", e=>{ if(e.target===ov) done(false); });
    ov.querySelector('[data-a="no"]').addEventListener("click", ()=>done(false));
    ov.querySelector('[data-a="yes"]').addEventListener("click", ()=>done(true));
  });
}

function renderEntryRow(entry, editing){
  const isPayment = entry.type==="payment";
  const isForgive = entry.type==="forgive";
  const isDeferred = entry.deferred && entry.type==="charge";
  const label = entryLabel(entry);
  const amtClass = isPayment || isForgive ? "payment" : "charge";
  const amtSign = isPayment || isForgive ? "− " : "+ ";
  const rowClass = "row" + (isDeferred ? " deferred" : "");

  const actions = editing ? `<span class="actions">
    <button class="edit-entry" data-id="${entry.entryId}" data-type="${entry.type}">✏️</button>
    <button class="del-entry" data-id="${entry.entryId}">🗑️</button>
  </span>` : '';

  let deferToggle = '';
  if(editing && entry.type==="charge"){
    const checked = entry.deferred ? 'checked' : '';
    deferToggle = `<label class="switch" data-id="${entry.entryId}" style="margin-left:8px">
      <input type="checkbox" class="defer-chk" data-id="${entry.entryId}" ${checked}>
      <span class="switch-track"><span class="switch-thumb"></span></span>
      <span class="switch-label">Defer</span>
    </label>`;
  }

  return `<div class="${rowClass}">
    <div class="desc"><div class="desc-head"><b>${esc(label)}</b> ${deferToggle}</div><small>${esc(displayDate(entry.date))}</small></div>
    <div class="amt ${amtClass}">${amtSign}${fmt(entry.amount)}</div>
    ${actions}
  </div>`;
}

function renderHistoryRows(entries, editing){
  if(!entries.length) return `<div class="empty">No entries yet.</div>`;
  return entries.map(e => renderEntryRow(e, editing)).join("");
}

function buildFinancialBreakdownHTML(overdue, currentDue, deferredAmt){
  // Total remaining is derived from overdue+currentDue (both computed from
  // the same freshly-fetched ledger) rather than the citizen's cached
  // balance, which can lag a moment behind right after a payment/waive —
  // keeping this panel internally consistent even if the balance-block
  // above it hasn't re-rendered yet.
  const totalRemaining = overdue + currentDue;
  if(totalRemaining<=0 && deferredAmt<=0) return '';
  return `<div class="breakdown">
    ${overdue>0 ? `<div class="brow"><span>Overdue</span><b class="money" style="color:var(--due)">${fmt(overdue)}</b></div>` : ''}
    ${currentDue>0 ? `<div class="brow"><span>Current due</span><b class="money">${fmt(currentDue)}</b></div>` : ''}
    ${deferredAmt>0 ? `<div class="brow"><span>Deferred</span><b class="money" style="color:var(--partial)">${fmt(deferredAmt)}</b></div>` : ''}
    <div class="brow total"><span>Total remaining</span><b class="money">${fmt(totalRemaining)}</b></div>
  </div>`;
}

async function renderCitizenDetail(id){
  const c = allCitizens.find(x=>x.id===id);
  if(!c){
    $("adminDetail").innerHTML = `<div class="notice err">Citizen not found. Please refresh and try again.</div>`;
    return;
  }
  try{
    const entries = ledgerCache.get(id) || await store.getLedger(id) || [];
    const bal = getEffectiveBalance(c);
    const allSorted = [...entries].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    const INITIAL_HISTORY = 3;

    const state = { historyExpanded: false, historyEditing: false };

    const hasOwing = bal > 0;
    const isOverpaid = bal < 0;
    const headerBadge = hasOwing
      ? `<span class="badge action action-paid" id="hdrMarkPaid">Pay Full Balance</span>`
      : isOverpaid
        ? `<span class="badge paid">Overpaid</span>`
        : `<span class="badge paid">Cleared</span>`;
    const actionBadges = hasOwing ? `<div class="badge-row" style="padding:0 18px 14px">
      <span class="badge action action-pay" id="btnPayment">Payment</span>
      <span class="badge action action-waive" id="btnWaive">Waive</span>
    </div>` : isOverpaid ? `<div class="badge-row" style="padding:0 18px 14px">
      <span class="badge action action-return" id="btnReturn">Return</span>
      <span class="badge action action-return" id="btnSanitationFee">Sanitation Fee</span>
    </div>` : '';
    const totalEntries = allSorted.length;
    const visibleEntries = state.historyExpanded ? allSorted : allSorted.slice(0, INITIAL_HISTORY);
    const hiddenCount = totalEntries - Math.min(INITIAL_HISTORY, totalEntries);
    const historyHTML = renderHistoryRows(visibleEntries, false);
    const deferredAmt = getDeferredAmount(c);
    const {overdue, currentDue} = getOverdueBreakdown(entries);
    const breakdownHTML = buildFinancialBreakdownHTML(overdue, currentDue, deferredAmt);

    $("adminDetail").innerHTML = buildCitizenDetailHTML(c, bal, historyHTML, headerBadge, actionBadges, totalEntries, hiddenCount, breakdownHTML);
    attachCitizenDetailListeners(id, c, bal, allSorted, INITIAL_HISTORY, state);
  } catch(err) { console.error(err); }
}

function attachCitizenDetailListeners(id, citizen, balance, allSorted, initialHistoryCount, stateRef){
  // Pay Full Balance
  if($("hdrMarkPaid")) $("hdrMarkPaid").addEventListener("click", async ()=>{
    const name = citizen.name || id;
    const ok = await confirmAction(`Mark ${name} fully paid (${fmt(balance)})?`);
    if(ok) await markFullyPaid(id, balance);
  });

  // Payment badge → open sheet
  if($("btnPayment")) $("btnPayment").addEventListener("click", ()=> openPaymentSheet(id, balance));

  // Waive badge → open sheet
  if($("btnWaive")) $("btnWaive").addEventListener("click", ()=> openWaiveSheet(id, balance));

  // Return badge → open sheet
  if($("btnReturn")) $("btnReturn").addEventListener("click", ()=> openReturnSheet(id, balance));

  // Sanitation Fee badge → open sheet
  if($("btnSanitationFee")) $("btnSanitationFee").addEventListener("click", ()=> openSanitationFeeSheet(id, balance));

  $("delCitizen").addEventListener("click", ()=>deleteCitizen(id));
  $("adminBackBtn").addEventListener("click", closeCitizenDetail);

  // Edit button — toggles edit mode
  $("histEditBtn").addEventListener("click", ()=>{
    stateRef.historyEditing = !stateRef.historyEditing;
    $("histEditBtn").textContent = stateRef.historyEditing ? "Done" : "Edit";
    const vis = stateRef.historyExpanded ? allSorted : allSorted.slice(0, initialHistoryCount);
    $("historyBody").innerHTML = renderHistoryRows(vis, stateRef.historyEditing);
    attachHistoryListeners(id, stateRef.historyEditing);
  });

  // See more / Show less
  if($("histMore")) $("histMore").addEventListener("click", ()=>{
    stateRef.historyExpanded = !stateRef.historyExpanded;
    const vis = stateRef.historyExpanded ? allSorted : allSorted.slice(0, initialHistoryCount);
    const hid = allSorted.length - vis.length;
    $("historyBody").innerHTML = renderHistoryRows(vis, stateRef.historyEditing);
    if(hid > 0){
      $("histMore").textContent = stateRef.historyExpanded ? "Show less" : `See more (${hid} more)`;
    } else {
      $("histMore").remove();
    }
    attachHistoryListeners(id, stateRef.historyEditing);
  });

  attachHistoryListeners(id, false);
}

function attachHistoryListeners(id, editing){
  // Defer toggles
  document.querySelectorAll(".defer-chk").forEach(chk=>{
    chk.addEventListener("change", async ()=>{
      const entryId = chk.dataset.id;
      const prevState = !chk.checked;
      try{
        await store.toggleDefer(id, entryId, chk.checked);
        clearOperationErrors();
        toast("Deferral updated");
        await renderCitizenDetail(id);
      } catch(e){
        handleOperationError("toggleDefer", e);
        chk.checked = prevState;
        toast("Failed to update deferral. Please try again.");
      }
    });
  });

  if(!editing) return;

  // Edit entry
  document.querySelectorAll(".edit-entry").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const entryId = btn.dataset.id;
      const entries = ledgerCache.get(id) || await store.getLedger(id);
      const entry = entries.find(e=>e.entryId===entryId);
      if(!entry) return;
      openEditEntry(id, entryId, entry);
    });
  });

  // Delete entry
  document.querySelectorAll(".del-entry").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const entryId = btn.dataset.id;
      if(!(await confirmAction("Delete this entry?", true))) return;
      await store.deleteEntry(id, entryId);
      toast("Entry deleted");
      await renderCitizenDetail(id);
    });
  });
}

  if(isNaN(amt)){ toast("Enter valid amount"); return; }
  const note = $("editNote").value.trim();
  const date = $("editDate").value;
  try{
    await store.editEntry(citizenId, entryId, { amount:amt, note, date });
    clearOperationErrors();
    toast("Entry updated");
    closeSheet();
    await renderCitizenDetail(citizenId);
  }catch(err){
    handleOperationError("editEntry", err);
    toast("Failed to update");
  }
}

function openEditEntry(citizenId, entryId, entry){
  openSheet("Edit entry", `
    <div class="field"><label>Amount</label><input id="editAmt" type="number" step="0.01" value="${entry.amount}"></div>
    <div class="field"><label>Note</label><input id="editNote" value="${esc(entry.note||"")}"></div>
    <div class="field"><label>Date</label><input id="editDate" type="date" value="${entry.date||todayISO()}"></div>
    <button class="btn block" id="saveEdit">Save</button>
  `);
  $("saveEdit").addEventListener("click", ()=> handleEditEntrySubmit(citizenId, entryId));
}

/* ============================================================
   ADMIN — CSV Export
   ============================================================ */
let exportBusy=false;

async function withExportUI(buttonId, originalText, exportFn){
  if(exportBusy) return;
  exportBusy=true;
  const btn = $(buttonId);
  if(btn){ btn.disabled=true; btn.textContent="Preparing…"; }
  try{
    await exportFn();
    clearOperationErrors();
  }catch(err){
    handleOperationError("export", err);
    toast("Export failed");
  }finally{
    exportBusy=false;
    if(btn){ btn.disabled=false; btn.textContent=originalText; }
  }
}

async function doExportCsv(){
  await withExportUI("exportCsvBtn2", "Export owing list (CSV)", async ()=>{
    const csv = await store.exportOwingCsv();
    downloadBlob(csv, `owing_${todayISO()}.csv`, "text/csv");
    toast("CSV exported");
  });
}

async function doExportAll(){
  await withExportUI("exportAllBtn", "Export all households (CSV)", async ()=>{
    const citizens = allCitizens;
    const ledgers = ledgerCache.size ? Object.fromEntries(ledgerCache) : await store.getAllLedgers();
    let csv = "Name,Job Card,Total Charged (₹),Total Paid (₹),Balance (₹),Status,Payment History\n";
    for(const c of citizens){
      const entries = ledgers[c.id] || [];
      const payments = entries.filter(e=>e.type==="payment").map(e=>`${entryLabel(e)} ${fmt(e.amount)}`).join("; ");
      const status = statusOf(c);
      csv += `"${esc(c.name)}","${esc(c.jobCard)}",${c.totalCharged||0},${c.totalPaid||0},${c.balance||0},"${statusLabel[status]}","${esc(payments)}"\n`;
    }
    downloadBlob(csv, `all_households_${todayISO()}.csv`, "text/csv");
    toast("CSV exported");
  });
}

async function openExportPeriod(){
  if(ledgerCache.size===0) await store.getAllLedgers();
  const { periods } = getPeriodStats();
  openSheet("Export by period", `
    <p style="font-size:13px;color:var(--muted);margin:0 0 12px">Select a period to export contribution charges for that month.</p>
    <div class="field"><label>Period</label>
      <select id="exportPeriodSel" class="period-sel">
        <option value="">Select period...</option>
        ${periods.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('')}
      </select>
    </div>
    <button class="btn block" id="exportPeriodConfirm">Export</button>
  `);
  $("exportPeriodConfirm").addEventListener("click", async ()=>{
    const period = $("exportPeriodSel").value;
    if(!period){ toast("Please select a period"); return; }
    await doExportPeriod(period);
    closeSheet();
  });
}

async function doExportPeriod(period){
  if(exportBusy) return; exportBusy=true;
  try{
    const ledgers = ledgerCache.size ? Object.fromEntries(ledgerCache) : await store.getAllLedgers();
    let csv = "Name,Job Card,Amount (₹),Status,Payment History\n";
    for(const c of allCitizens){
      const entries = ledgers[c.id] || [];
      const charge = entries.find(e => e.type==="charge" && e.note===period);
      if(charge){
        const payments = entries.filter(e=>e.type==="payment").map(e=>`${entryLabel(e)} ${fmt(e.amount)}`).join("; ");
        const status = charge.deferred ? "Deferred" : "Active";
        csv += `"${esc(c.name)}","${esc(c.jobCard)}",${charge.amount},"${status}","${esc(payments)}"\n`;
      }
    }
    downloadBlob(csv, `period_${esc(period).replace(/\s+/g,'_')}_${todayISO()}.csv`, "text/csv");
    toast("CSV exported");
  }catch(err){
    handleOperationError("exportPeriod", err);
    toast("Export failed");
  }finally{
    exportBusy=false;
  }
}

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    console.log('Service Worker registered', reg.scope);
  }).catch(err=>{
    console.log('Service Worker registration failed', err);
  });
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    console.log('New service worker activated, reloading');
    window.location.reload();
  });
}
