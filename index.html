let exportBusy=false;
async function doExportCsv(){
  if(exportBusy) return; exportBusy=true;
  const btn=$("exportCsvBtn2"); if(btn){ btn.disabled=true; btn.textContent="Preparing…"; }
  let url;
  try{
    const csv = await store.exportOwingCsv();
    clearOperationErrors();
    const blob = new Blob([csv], {type:"text/csv"});
    try{
      url = URL.createObjectURL(blob);
    } catch(e){
      console.error("Failed to create object URL:", e);
      toast("Export failed: could not create download link");
      return;
    }
    const a = document.createElement("a");
    try{
      a.href = url; a.download = `owing_${todayISO()}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast("CSV exported");
    } catch(e){
      console.error("Failed to trigger download:", e);
      toast("Export failed: could not trigger download");
    }
  }catch(err){
    handleOperationError("exportOwingCsv", err);
    toast("Export failed");
  }
  finally{
    if(url) URL.revokeObjectURL(url);
    exportBusy=false;
    if(btn){ btn.disabled=false; btn.textContent="Export owing list (CSV)"; }
  }
}

async function doExportAll(){
  if(exportBusy) return; exportBusy=true;
  const btn=$("exportAllBtn"); if(btn){ btn.disabled=true; btn.textContent="Preparing…"; }
  let url;
  try{
    const citizens = allCitizens;
    const ledgers = ledgerCache.size ? Object.fromEntries(ledgerCache) : await store.getAllLedgers();
    clearOperationErrors();
    let csv = "Name,Job Card,Total Charged (₹),Total Paid (₹),Balance (₹),Status,Payment History\n";
    for(const c of citizens){
      const entries = ledgers[c.id] || [];
      const payments = entries.filter(e=>e.type==="payment").map(e=>`${entryLabel(e)} ${fmt(e.amount)}`).join("; ");
      const status = statusOf(c);
      csv += `"${esc(c.name)}","${esc(c.jobCard)}",${c.totalCharged||0},${c.totalPaid||0},${c.balance||0},"${statusLabel[status]}","${esc(payments)}"\n`;
    }
    const blob = new Blob([csv], {type:"text/csv"});
    try{
      url = URL.createObjectURL(blob);
    } catch(e){
      console.error("Failed to create object URL:", e);
      toast("Export failed: could not create download link");
      return;
    }
    const a = document.createElement("a");
    try{
      a.href = url; a.download = `all_households_${todayISO()}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast("CSV exported");
    } catch(e){
      console.error("Failed to trigger download:", e);
      toast("Export failed: could not trigger download");
    }
  }catch(err){
    handleOperationError("exportAllHouseholds", err);
    toast("Export failed");
  }
  finally{
    if(url) URL.revokeObjectURL(url);
    exportBusy=false;
    if(btn){ btn.disabled=false; btn.textContent="Export all households (CSV)"; }
  }
}

async function openExportPeriod(){
  if(ledgerCache.size===0) await store.getAllLedgers();
  const { periods } = getPeriodStats();
  openSheet("Export by period", `
    <p style="font-size:13px;color:var(--muted);margin:0 0 12px">Select a period to export contribution charges for that month.</p>
    <div class="field"><label>Period</label>
      <select id="exportPeriodSel" class="period-sel">
        <option value="">Select period...</option>
        ${periods.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('')}
      </select>
    </div>
    <button class="btn block" id="exportPeriodConfirm">Export</button>
  `);
  $("exportPeriodConfirm").addEventListener("click", async ()=>{
    const period = $("exportPeriodSel").value;
    if(!period){ toast("Please select a period"); return; }
    await doExportPeriod(period);
    closeSheet();
  });
}

async function doExportPeriod(period){
  if(exportBusy) return; exportBusy=true;
  try{
    const ledgers = ledgerCache.size ? Object.fromEntries(ledgerCache) : await store.getAllLedgers();
    let csv = "Name,Job Card,Amount (₹),Status,Payment History\n";
    for(const c of allCitizens){
      const entries = ledgers[c.id] || [];
      const charge = entries.find(e => e.type==="charge" && e.note===period);
      if(charge){
        const payments = entries.filter(e=>e.type==="payment").map(e=>`${entryLabel(e)} ${fmt(e.amount)}`).join("; ");
        const status = charge.deferred ? "Deferred" : "Active";
        csv += `"${esc(c.name)}","${esc(c.jobCard)}",${charge.amount},"${status}","${esc(payments)}"\n`;
      }
    }
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `period_${esc(period).replace(/\s+/g,'_')}_${todayISO()}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("CSV exported");
  }catch(err){ toast("Export failed"); console.error(err); }
  finally{ exportBusy=false; }
}
